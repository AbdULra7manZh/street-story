<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Street Story</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Street Story</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </nav>

    <section class="signup-hero">
        <div class="login-overlay"></div>

        <div class="signup-container">
            <h2>Create Account</h2>
            <p class="login-text">Join Street Story and start discovering the stories behind street names.</p>

            <form class="form">
                <label for="fullname">Full Name:</label>
                <input id="fullname" type="text" placeholder="Enter your full name" required>

                <label for="email">Email:</label>
                <input id="email" type="email" placeholder="Enter your email" required>

                <label for="password">Password:</label>
                <input id="password" type="password" placeholder="Enter your password" required>

                <label for="confirm-password">Confirm Password:</label>
                <input id="confirm-password" type="password" placeholder="Confirm your password" required>

                <button type="submit">Sign Up</button>
            </form>
        </div>
    </section>

</body>
</html>

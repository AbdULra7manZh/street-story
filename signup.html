<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Street Story</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">Street Story</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </nav>

    <section class="signup-hero">
        <div class="login-overlay"></div>

        <div class="signup-container">
            <h2>Create Account</h2>
            <p class="login-text">Join Street Story and start discovering the stories behind street names.</p>

            <form class="form" id="signupForm">
                <label for="fullname">Full Name:</label>
                <input id="fullname" type="text" placeholder="Enter your full name">

                <label for="signupEmail">Email:</label>
                <input id="signupEmail" type="email" placeholder="Enter your email">

                <label for="signupPassword">Password:</label>
                <input id="signupPassword" type="password" placeholder="Enter your password">

                <label for="confirmPassword">Confirm Password:</label>
                <input id="confirmPassword" type="password" placeholder="Confirm your password">

                <p id="signupMessage"></p>

                <button type="submit">Sign Up</button>
            </form>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
